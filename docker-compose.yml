services:
  kafka:
    image: apache/kafka:latest
    container_name: kafka-broker
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      # Using 127.0.0.1 here ensures the internal controller finds itself
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@127.0.0.1:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # Static ID prevents "dirty" metadata errors
      CLUSTER_ID: mkU3OrukT92ZyKu9ghCH9Q
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_RETENTION_HOURS: 1
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server 127.0.0.1:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      DYNAMIC_CONFIG_ENABLED: 'true'
      KAFKA_CLUSTERS_0_NAME: local-kraft
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  delay-detector:
    build: .
    command: uv run faststream run scripts.consumer:app
    deploy:
      replicas: 3
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_URL: kafka:9092
      UV_LINK_MODE: copy
    volumes:
      - .:/app
      - uv-cache:/root/.cache/uv  # Persists the downloads
    working_dir: /app

  data-producer:
    container_name: data-producer
    build: .
    command: uv run python scripts/producer.py
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_URL: kafka:9092
      PYTHONPATH: .
    volumes:
      - .:/app
    working_dir: /app
    profiles: ["manual"]
  
volumes:
  uv-cache: